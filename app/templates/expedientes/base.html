{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIEMSa - Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="{% static 'app/css/home.css' %}">
  
  
  {% block head %}{% endblock %}
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <button class="collapse-btn" onclick="toggleCollapse()">
        <i data-lucide="chevron-left" id="collapse-icon"></i>
    </button>
    
    <div class="menu">
      <div class="logo">SIEMSa</div>
      <nav>
        <a href="{% url 'home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
          <i data-lucide="home"></i> <span>Inicio</span>
        </a>
        <a href="{% url 'exportacion' %}" class="{% if request.resolver_match.url_name == 'exportacion' %}active{% endif %}">
          <i data-lucide="search"></i> <span>Buscar Expediente</span>
        </a>
        <a href="{% url 'exportaciones' %}" class="{% if request.resolver_match.url_name == 'exportaciones' %}active{% endif %}">
          <i data-lucide="truck"></i> <span>Exportaciones</span>
        </a>
        <a href="{% url 'minerales' %}" class="{% if request.resolver_match.url_name == 'minerales' %}active{% endif %}">
          <i data-lucide="layers"></i> <span>Minerales</span>
        </a>
        <a href="{% url 'vista_graficos_general' %}" class="{% if request.resolver_match.url_name == 'graficos' %}active{% endif %}">
          <i data-lucide="bar-chart-3"></i> <span>Gráficos</span>
        </a>

        <a class="theme-toggle" onclick="toggleTheme()" id="theme-btn" style="margin-top: 2rem;">
          <i data-lucide="moon" id="theme-icon"></i> <span style="margin-left: 12px;" id="theme-text">Modo Oscuro</span>
        </a>
        <a href="{% url 'logout' %}" style="margin-top: 0.5rem; color: #ef4444;">
          <i data-lucide="log-out"></i> <span>Cerrar Sesión</span>
        </a>
      </nav>
    </div>

    <div class="user-footer">
      <i class="fa fa-user-circle-o"></i> {{ user.get_full_name|default:user.username }}
    </div>
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="{% static 'app/js/home.js' %}"></script>
  {% block script %}{% endblock %}
</body>
</html>

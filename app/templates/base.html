{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Sidebar Profesional</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="{% static 'app/css/home.css'%}">
  {% block head %}
  {% endblock %}
</head>
<body>

  <aside class="sidebar" id="sidebar">

    <button class="collapse-btn" onclick="toggleCollapse()">
      <i data-lucide="chevrons-left"></i>
    </button>
    <div class="menu" style="overflow-y: hidden;">
      <div class="logo">SIEMSa</div>
      <nav>

        <a href="{% url 'home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}"
          title="Inicio">
          <i data-lucide="home"></i> <span>Inicio</span>
        </a>
        
        {% block nav %}
        {% endblock %}


        <a class="theme-toggle" onclick="toggleTheme()" id="theme-btn" style="margin-top: 2rem;">
          <i data-lucide="moon" id="theme-icon"></i> <span style="margin-left: 12px;" id="theme-text">Modo Oscuro</span>
        </a>
        <a href="{% url 'logout' %}" style="margin-top: 0.5rem; color: #ef4444;">
          <i data-lucide="log-out"></i> <span>Cerrar Sesión</span>
        </a>
      </nav>

    </div>
    <div class="user-footer">
      <div><i style="margin: 10px;" class="fa fa-user-circle" aria-hidden="true"></i>
        {{ user.get_full_name|default:user.username }}</div>
    </div>
  </aside>

  <main class="main">

    {% block content %}

    {% endblock %}
    

    
    {% block script %}
    {% endblock %}
    <script src="{% static 'app/js/home.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  </body>

</html>
